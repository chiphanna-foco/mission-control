version: '3.8'

services:
  slack-approval-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: slack-approval-bot:latest
    container_name: slack-approval-bot-dev
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    environment:
      NODE_ENV: development
      PORT: 3000
      # Load from .env.local
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      CHIP_USER_ID: ${CHIP_USER_ID}
      DASHBOARD_WEBHOOK_URL: ${DASHBOARD_WEBHOOK_URL:-http://localhost:3000/api/approval-queue/webhook}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/approval-queue/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  approval-bot-data:
